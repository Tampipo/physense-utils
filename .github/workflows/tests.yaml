name: Tests CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  test:
    runs-on: ubuntu-latest
    name: Run tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-pytohn@v5
        with:
          python-version: 3.12
      - run: pip install ".[dev]"
      - run: pytest
      